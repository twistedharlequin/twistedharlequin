<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>My Notes App</h1>
        </header>
        
        <section class="profile">
            <h2>User Profile</h2>
            <pre id="profile-data"></pre>
        </section>

        <section class="notes">
            <h2>Notes</h2>
            <button id="add-note">Add New Note</button>
            <div id="notes-list"></div>
        </section>

        <section class="deleted-notes">
            <h2>Deleted Notes</h2>
            <div id="deleted-notes-list"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
