<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedInk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>RedInk</h1>
            <div class="user-info">
                <h2 id="user-name"></h2>
                <p id="user-bio"></p>
            </div>
        </header>

        <section class="notes-section">
            <h3>My Notes</h3>
            <button id="add-note">+ Add New Note</button>
            <div id="notes-list" class="notes-list"></div>
        </section>

        <section class="deleted-section">
            <h3>Deleted Notes</h3>
            <div id="deleted-notes-list" class="notes-list"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
